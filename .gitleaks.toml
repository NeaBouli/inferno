title = "Inferno Custom Gitleaks Config"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''node_modules''',
    '''\.git''',
    '''package-lock\.json''',
    '''yarn\.lock''',
    '''artifacts''',
    '''cache'''
  ]

[[rules]]
  description = "Ethereum Private Key"
  id = "eth-private-key"
  regex = '''(?i)(0x[0-9a-fA-F]{64})'''
  tags = ["key", "ethereum", "crypto"]
  severity = "CRITICAL"

[[rules]]
  description = "Anthropic API Key"
  id = "anthropic-api-key"
  regex = '''sk-ant-[a-zA-Z0-9\-_]{20,}'''
  tags = ["key", "anthropic", "ai"]
  severity = "CRITICAL"

[[rules]]
  description = "Telegram Bot Token"
  id = "telegram-bot-token"
  regex = '''[0-9]{8,10}:AA[a-zA-Z0-9_-]{33}'''
  tags = ["key", "telegram"]
  severity = "CRITICAL"

[[rules]]
  description = "Alchemy API Key"
  id = "alchemy-api-key"
  regex = '''(?i)(alchemy\.com/v2/[a-zA-Z0-9_-]{20,})'''
  tags = ["key", "alchemy"]
  severity = "HIGH"

[[rules]]
  description = "BIP39 Mnemonic Phrase"
  id = "bip39-mnemonic"
  regex = '''(?i)(mnemonic|seed.phrase|seed_phrase)\s*[=:]\s*["']?([a-z]+\s){11,23}[a-z]+["']?'''
  tags = ["key", "wallet", "mnemonic"]
  severity = "CRITICAL"
