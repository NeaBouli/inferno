name: Benefits Wallet Prototype

on:
  push:
    branches: [main]
    paths:
      - 'apps/benefits-wallet-prototype/**'
      - 'docs/ifrp-commerce-app/EMBEDDED_WALLET_DECISION.md'
      - 'docs/ifrp-commerce-app/MASTER_ARCHITECTURE.md'
      - 'docs/SHOP_BENEFITS_APP_ARCHITECTURE.md'
      - '.github/workflows/benefits-wallet-prototype.yml'
  pull_request:
    paths:
      - 'apps/benefits-wallet-prototype/**'
      - 'docs/ifrp-commerce-app/EMBEDDED_WALLET_DECISION.md'
      - 'docs/ifrp-commerce-app/MASTER_ARCHITECTURE.md'
      - 'docs/SHOP_BENEFITS_APP_ARCHITECTURE.md'
      - '.github/workflows/benefits-wallet-prototype.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/benefits-wallet-prototype
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/benefits-wallet-prototype/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm test
