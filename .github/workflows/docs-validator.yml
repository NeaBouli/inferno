name: Docs Validator

on:
  push:
    branches: [main, master, develop, dev]
    paths:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '*.md'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  validate-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' \
            --disable MD013 MD033 MD041 MD024 MD036 MD040 \
            || true

  validate-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files in docs
        run: |
          EXIT=0
          for f in $(find docs -name '*.json' 2>/dev/null); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON: $f"
              EXIT=1
            else
              echo "✓ $f"
            fi
          done
          exit $EXIT

  validate-links:
    name: Internal Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal doc references
        run: |
          EXIT=0
          for f in docs/*.md; do
            [ -f "$f" ] || continue
            # Extract markdown links to local files (not http/https)
            grep -oP '\[.*?\]\(\K[^)]+' "$f" 2>/dev/null | grep -v '^http' | while read -r link; do
              # Resolve relative to the file's directory
              dir=$(dirname "$f")
              target="$dir/$link"
              if [ ! -f "$target" ] && [ ! -f "$link" ]; then
                echo "::warning file=$f::Broken link: $link"
              fi
            done
          done

  validate-structure:
    name: Docs Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required doc files exist
        run: |
          EXIT=0
          for required in docs/WHITEPAPER.md docs/ROADMAP.md docs/CHANGELOG.md docs/SECURITY_POLICY.md; do
            if [ -f "$required" ]; then
              echo "✓ $required"
            else
              echo "::warning::Missing recommended file: $required"
            fi
          done

      - name: Check for empty doc files
        run: |
          EMPTY=0
          for f in docs/*.md; do
            [ -f "$f" ] || continue
            if [ ! -s "$f" ]; then
              echo "::warning file=$f::Empty file: $f"
              EMPTY=$((EMPTY+1))
            fi
          done
          echo "Found $EMPTY empty doc files"

  docs-summary:
    name: Docs Summary
    runs-on: ubuntu-latest
    needs: [validate-markdown, validate-json, validate-links, validate-structure]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Docs Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ${{ needs.validate-markdown.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Validation | ${{ needs.validate-json.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal Links | ${{ needs.validate-links.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Structure | ${{ needs.validate-structure.result }} |" >> $GITHUB_STEP_SUMMARY
