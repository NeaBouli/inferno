name: Benefits Network CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/benefits-network/**'
      - '.github/workflows/benefits-network.yml'
  pull_request:
    paths:
      - 'apps/benefits-network/**'
      - '.github/workflows/benefits-network.yml'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/backend
    env:
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - run: npm run smoke:http

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
