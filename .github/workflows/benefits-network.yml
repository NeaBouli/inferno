name: Benefits Network CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/benefits-network/**'
      - 'docs/BENEFITS_NETWORK_TEST.md'
      - 'docs/qa/BENEFITS_DEVICE_WALLET_CHECKLIST.json'
      - 'docs/runbooks/BENEFITS_DEVICE_WALLET_TEST_RUNBOOK.md'
      - 'scripts/smoke-benefits-network.js'
      - 'scripts/test-benefits-customer-pass-ui.js'
      - 'scripts/test-benefits-discovery-ui.js'
      - 'scripts/test-benefits-wallet-lock-ui.js'
      - 'scripts/test-benefits-doc-consistency.cjs'
      - 'scripts/test-benefits-service-worker.js'
      - 'scripts/test-benefits-wallet-asset-provider.mjs'
      - 'scripts/test-benefits-node-runtime.cjs'
      - 'scripts/test-deploy-benefits-capacity.sh'
      - 'scripts/report-benefits-device-checklist.js'
      - 'scripts/record-benefits-device-evidence.js'
      - 'scripts/validate-benefits-device-checklist.js'
      - 'package.json'
      - '.github/workflows/benefits-network.yml'
  pull_request:
    paths:
      - 'apps/benefits-network/**'
      - 'docs/BENEFITS_NETWORK_TEST.md'
      - 'docs/qa/BENEFITS_DEVICE_WALLET_CHECKLIST.json'
      - 'docs/runbooks/BENEFITS_DEVICE_WALLET_TEST_RUNBOOK.md'
      - 'scripts/smoke-benefits-network.js'
      - 'scripts/test-benefits-customer-pass-ui.js'
      - 'scripts/test-benefits-discovery-ui.js'
      - 'scripts/test-benefits-wallet-lock-ui.js'
      - 'scripts/test-benefits-doc-consistency.cjs'
      - 'scripts/test-benefits-service-worker.js'
      - 'scripts/test-benefits-wallet-asset-provider.mjs'
      - 'scripts/test-benefits-node-runtime.cjs'
      - 'scripts/test-deploy-benefits-capacity.sh'
      - 'scripts/report-benefits-device-checklist.js'
      - 'scripts/record-benefits-device-evidence.js'
      - 'scripts/validate-benefits-device-checklist.js'
      - 'package.json'
      - '.github/workflows/benefits-network.yml'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/backend
    env:
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm run test:migration-upgrade
      - run: npm test
      - run: npm run test:ethers-v6-lifecycle
      - run: npm run build
      - run: npm run smoke:http
      - name: Build and verify Node 22 backend image
        run: |
          set -euo pipefail
          docker build -t inferno-benefits-backend:ci .
          container="$(docker run -d --tmpfs /data -p 127.0.0.1:3001:3001 \
            -e DATABASE_URL=file:/data/ci.db \
            -e CHAIN_ID=11155111 \
            -e RPC_URL=https://mock-rpc.example.com \
            -e IFRLOCK_ADDRESS=0x0000000000000000000000000000000000000001 \
            -e ADMIN_SECRET=ci-admin-secret \
            inferno-benefits-backend:ci)"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/api/ready >/dev/null; then ready=1; break; fi
            sleep 1
          done
          if [ "$ready" != 1 ]; then docker logs "$container"; exit 1; fi
          curl -fsS http://127.0.0.1:3001/api/health >/dev/null
          curl -fsS 'http://127.0.0.1:3001/api/businesses?limit=1' >/dev/null
          docker exec "$container" node --version | grep -E '^v22\.'

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm run test:proof-link
      - run: npm run test:discoverability
      - run: node ../../../scripts/test-benefits-doc-consistency.cjs
      - run: npm run typecheck
      - run: npm run build
      - name: Build and verify Node 22 frontend image
        run: |
          set -euo pipefail
          docker build -t inferno-benefits-frontend:ci .
          container="$(docker run -d -p 127.0.0.1:3000:3000 inferno-benefits-frontend:ci)"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then ready=1; break; fi
            sleep 1
          done
          if [ "$ready" != 1 ]; then docker logs "$container"; exit 1; fi
          curl -fsS http://127.0.0.1:3000/guide >/dev/null
          curl -fsS http://127.0.0.1:3000/manifest.json >/dev/null
          docker exec "$container" node --version | grep -E '^v22\.'

  test-device-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm run qa:benefits-devices
      - run: npm run qa:benefits-report
      - run: npm run test:benefits-sw
      - run: npm run test:benefits-wallet-asset
      - run: npm run test:benefits-node-runtime
      - run: bash scripts/test-deploy-benefits-capacity.sh

  test-customer-pass-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix apps/benefits-network/frontend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:benefits-pass-ui
      - run: npm run test:benefits-discovery-ui
      - run: npm run test:benefits-wallet-ui
