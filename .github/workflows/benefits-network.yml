name: Benefits Network CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/benefits-network/**'
      - 'docs/BENEFITS_NETWORK_TEST.md'
      - 'docs/qa/BENEFITS_DEVICE_WALLET_CHECKLIST.json'
      - 'docs/runbooks/BENEFITS_DEVICE_WALLET_TEST_RUNBOOK.md'
      - 'scripts/smoke-benefits-network.js'
      - 'scripts/test-benefits-customer-pass-ui.js'
      - 'scripts/test-benefits-wallet-lock-ui.js'
      - 'scripts/test-benefits-doc-consistency.cjs'
      - 'scripts/test-benefits-service-worker.js'
      - 'scripts/test-benefits-wallet-asset-provider.mjs'
      - 'scripts/test-deploy-benefits-capacity.sh'
      - 'scripts/report-benefits-device-checklist.js'
      - 'scripts/record-benefits-device-evidence.js'
      - 'scripts/validate-benefits-device-checklist.js'
      - 'package.json'
      - '.github/workflows/benefits-network.yml'
  pull_request:
    paths:
      - 'apps/benefits-network/**'
      - 'docs/BENEFITS_NETWORK_TEST.md'
      - 'docs/qa/BENEFITS_DEVICE_WALLET_CHECKLIST.json'
      - 'docs/runbooks/BENEFITS_DEVICE_WALLET_TEST_RUNBOOK.md'
      - 'scripts/smoke-benefits-network.js'
      - 'scripts/test-benefits-customer-pass-ui.js'
      - 'scripts/test-benefits-wallet-lock-ui.js'
      - 'scripts/test-benefits-doc-consistency.cjs'
      - 'scripts/test-benefits-service-worker.js'
      - 'scripts/test-benefits-wallet-asset-provider.mjs'
      - 'scripts/test-deploy-benefits-capacity.sh'
      - 'scripts/report-benefits-device-checklist.js'
      - 'scripts/record-benefits-device-evidence.js'
      - 'scripts/validate-benefits-device-checklist.js'
      - 'package.json'
      - '.github/workflows/benefits-network.yml'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/backend
    env:
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm run test:migration-upgrade
      - run: npm test
      - run: npm run test:ethers-v6-lifecycle
      - run: npm run build
      - run: npm run smoke:http

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benefits-network/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/benefits-network/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm run test:proof-link
      - run: npm run test:discoverability
      - run: node ../../../scripts/test-benefits-doc-consistency.cjs
      - run: npm run typecheck
      - run: npm run build

  test-device-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm run qa:benefits-devices
      - run: npm run qa:benefits-report
      - run: npm run test:benefits-sw
      - run: npm run test:benefits-wallet-asset
      - run: bash scripts/test-deploy-benefits-capacity.sh

  test-customer-pass-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix apps/benefits-network/frontend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:benefits-pass-ui
      - run: npm run test:benefits-wallet-ui
