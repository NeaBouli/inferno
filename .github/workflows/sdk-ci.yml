name: IFR SDK CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/sdk/**'
      - 'apps/builder/engine/**'
      - 'test/builder/CodeGeneratorSource.test.cjs'
      - '.github/workflows/sdk-ci.yml'
  pull_request:
    paths:
      - 'apps/sdk/**'
      - 'apps/builder/engine/**'
      - 'test/builder/CodeGeneratorSource.test.cjs'
      - '.github/workflows/sdk-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: apps/sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: apps/sdk/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm test
      - run: npm run test:package
      - run: git diff --exit-code -- dist
      - name: Test the real Builder generator source
        run: |
          npx tsc --target ES2020 --module commonjs --esModuleInterop --skipLibCheck \
            --outDir /tmp/ifr-builder-engine ../builder/engine/*.ts
          node ../../test/builder/CodeGeneratorSource.test.cjs /tmp/ifr-builder-engine
