<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17130f" />
    <title>Offline | IFR Benefits</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #17130f;
        color: #f7f1e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #17130f;
      }

      main {
        width: min(100%, 560px);
        padding: clamp(28px, 7vw, 48px);
        border: 1px solid rgba(240, 166, 96, 0.28);
        border-radius: 24px;
        background: #241b15;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
      }

      p:first-of-type {
        margin: 20px 0 8px;
        color: #efa660;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 8vw, 48px);
        line-height: 1.05;
      }

      p {
        margin: 18px auto 0;
        color: #d7cec3;
        line-height: 1.65;
      }

      nav {
        display: grid;
        gap: 12px;
        margin-top: 30px;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border: 1px solid rgba(240, 166, 96, 0.42);
        border-radius: 14px;
        color: #fff7ed;
        font-weight: 800;
        text-decoration: none;
      }

      a:first-child {
        background: #b94b1d;
        border-color: #d66a33;
      }

      a:focus-visible {
        outline: 3px solid #f4b77c;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/ifr-token-192-v11.png" alt="Inferno IFR" width="72" height="72" />
      <p>IFR Benefits Network</p>
      <h1>You're offline</h1>
      <p>
        This seller page needs a connection to load current offers and verify IFR access.
        Your wallet and tokens are unchanged.
      </p>
      <nav aria-label="Offline actions">
        <a href="/">Open the offline app</a>
        <a href="">Try this page again</a>
      </nav>
    </main>
  </body>
</html>
